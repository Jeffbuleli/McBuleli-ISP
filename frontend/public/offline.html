<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Hors ligne — McBuleli</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        background: #121212;
        color: #fafafa;
        padding: 24px;
        text-align: center;
      }
      .box {
        max-width: 420px;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 20px;
        color: #a1a1aa;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      a {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 10px;
        background: #63b38f;
        color: #0a0a0a;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Pas de connexion</h1>
      <p>Vérifiez le réseau mobile ou le Wi‑Fi, puis réessayez. Les pages déjà visitées peuvent s’afficher hors ligne.</p>
      <a href="/">Retour à l’accueil</a>
    </div>
  </body>
</html>
